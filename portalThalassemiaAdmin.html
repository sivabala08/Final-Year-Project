<script>
$(function() {
	$('[name ="requirementDate"]').datepicker({
		dateFormat: "dd-mm-yy",
		minDate: "0"
    	//yearRange: "-100:-18"
	});
	$('[name ="requirementDate"]').datepicker().datepicker("setDate", new Date());
});

$( function() {
	var isFirstLogin = $('[name=isFirstLogin]').val();
	if(isFirstLogin != null && isFirstLogin == '1'){
	$("#exampleModalCenter").modal('show');
	$('[name=isFirstLogin]').val() = '0';
	}
  } );

function submitForm(hmode)
{
	//window.location = "/BLDAHIMS/bloodbank/portalThalassemiaAdmin.cnt?hmode="+hmode;
	document.getElementsByName('hmode')[0].value = hmode;
	//document.getElementsByName("hmode")[0].value=mode;
    document.forms[0].submit();
}
function saveRequest(){
	//alert("bb "+document.getElementsByName('bloodbank')[0].value == "-1");	
	
	var bloodgrp  = document.getElementsByName('bloodgroup')[0].value;
	var quantity  = document.getElementsByName('bloodQuanity')[0].value;
	var rh  = document.getElementsByName('rh')[0].value;
	var bloodbank  = document.getElementsByName('bloodbank')[0].value;
	var date  = document.getElementsByName('requirementDate')[0].value;
	var error = document.getElementById('errorMsg').innerHTML;
	var display = document.getElementById('errorMsg').style.display;
	var msg = '';
	
	if(document.getElementsByName('component')[0].value == "-1"){
		msg = "Please select component";
		document.getElementById('errorMsg').innerHTML = '<h4 class="text-danger">'+msg+'</h4>';
		document.getElementById('errorMsg').style.display = "";
		document.getElementsByName('component')[0].focus();
		//alert("msg "+msg);
	}else if(document.getElementsByName('bloodgroup')[0].value == "-1"){
		msg = "Please select blood ABO";
		//alert("msg "+msg);
		document.getElementById('errorMsg').innerHTML = '<h4 class="text-danger">'+msg+'</h4>';
		document.getElementById('errorMsg').style.display = "";
		document.getElementsByName('bloodgroup')[0].focus();
	}else if(rh == "-1"){
		msg = "Please select blood RH";
		//alert("msg "+msg);
		document.getElementById('errorMsg').innerHTML = '<h4 class="text-danger">'+msg+'</h4>';
		document.getElementById('errorMsg').style.display = "";
		document.getElementsByName('rh')[0].focus();
	}else if(bloodbank == "-1"){
		msg = "Please select bloodbank";
		//alert("msg "+msg);
		document.getElementById('errorMsg').innerHTML = '<h4 class="text-danger">'+msg+'</h4>';
		document.getElementById('errorMsg').style.display = "";
		document.getElementsByName('bloodbank')[0].focus();
	}else if(quantity == ""){
		msg = "Please enter  quantity";
		//alert("msg "+msg);
		document.getElementById('errorMsg').innerHTML = '<h4 class="text-danger">'+msg+'</h4>';
		document.getElementById('errorMsg').style.display = "";
		document.getElementsByName('bloodQuanity')[0].focus();
	}else{
		//alert("heyy");    
		//document.getElementsByName('hmode')[0].value = "SAVEREQUEST";
		//return;
		submitForm("SAVEREQUEST");
	}
	//alert("msg "+msg);
}
function portalLogout(){
	window.location = 'https://eraktkosh.mohfw.gov.in/BLDAHIMS/bloodbank/portalThalassemiaLogin.cnt?hmode=DONORPORTALLOGOUT'
}
